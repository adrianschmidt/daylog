notes_dir = "~/vitalog-notes"
# db_path defaults to {notes_dir}/.vitalog.db
# refresh_secs = 15
# day_start_hour = 0  # Hour (0-23) when a new day starts (top-level key).
                       # E.g., 4 means anything before 4 AM counts as yesterday.
# weight_unit = "lbs"  # or "kg". The DB stores raw numbers without unit info,
                       # so changing this mid-use makes historical values ambiguous.
# time_format = "12h"  # or "24h". Controls how times are written to markdown
                       # files and shown in the dashboard. The DB always
                       # stores canonical 24h "HH:MM".

[modules]
dashboard = true
training = true
trends = true
# climbing = false   # opt-in: most users don't climb

[exercises]
# Any exercise. Config-driven, no code needed.
# Format: name = { display = "Display Name", color = "color" }
# Colors: red, green, blue, yellow, cyan, magenta, white
squat = { display = "Squat", color = "cyan" }
bench = { display = "Bench", color = "green" }
deadlift = { display = "Deadlift", color = "yellow" }
ohp = { display = "OHP", color = "magenta" }
pullup = { display = "Pullup", color = "blue" }
rdl = { display = "RDL", color = "red" }

[metrics]
# Any numeric value. Config-driven, no code needed.
# Format: name = { display = "Display Name", color = "color", unit = "unit" }
# resting_hr = { display = "Resting HR", color = "red", unit = "bpm" }
# meditation_min = { display = "Meditation", color = "magenta", unit = "min" }

# [notes.aliases]
# Short keys that `vitalog note <key>` expands to fixed text.
# med-morning = "Morgonmedicin (Elvanse 70mg, Escitalopram 20mg, ...)"
# med-evening = "Kvällsmedicin (Escitalopram 10mg, ...)"

# [climbing]
# target_hang_weight = 0.0
# [climbing.board_adjustments]
# moonboard = 3
# kilter = 1
# tension = 1

# [reminders]
# Smart reminders that fire when something you've configured hasn't been
# logged recently. Shown at the top of `vitalog today` and in the JSON of
# both `today` and `status`.
#
# Each reminder picks one of four "watch" sources:
#   - "metric"    — a custom metric in [metrics] above
#   - "session"   — a row in the sessions table (any training session)
#   - "lift"      — a row in lift_sets (a specific exercise)
#   - "day_field" — a built-in days column: weight, sleep_hours, mood,
#                   energy, sleep_start, sleep_end
#
# `interval_days = N` means "fire if no matching row in the last N
# calendar days" — so 2 = every other day, 1 = daily, 7 = weekly.
#
# Time-of-day gates (optional, both independently optional):
#   - not_before = "HH:MM" — earliest wall-clock time the reminder may fire
#   - not_after  = "HH:MM" — latest wall-clock time it may fire
# When set, the reminder only counts as "due" inside the [not_before,
# not_after] window — useful for evening-task reminders that shouldn't
# nag at breakfast. Both fields are 24-hour. Overnight wrap-around is
# rejected; for overnight reminders, split into two reminders on the
# same metric, one with not_after, the other with not_before.
#
# [reminders.lactic_acid]
# display       = "Lactic acid training"
# interval_days = 2
# watch         = "metric"
# target        = "la_min"            # log via: vitalog log metric la_min 15
#
# [reminders.zone2]
# display       = "Zone 2 cardio"
# interval_days = 3
# watch         = "session"
# target        = { field = "zone2_min", min_value = 1 }
#
# [reminders.vo2_block]
# display       = "VO2max intervals"
# interval_days = 7
# watch         = "session"
# target        = { field = "type", equals = "vo2_max" }
#
# [reminders.deadlifts]
# display       = "Heavy deadlifts"
# interval_days = 7
# watch         = "lift"
# target        = { exercise = "deadlift", min_weight = 200 }
#
# [reminders.weigh_in]
# display       = "Daily weigh-in"
# interval_days = 1
# watch         = "day_field"
# target        = "weight"
#
# [reminders.brush_evening]
# display       = "Brush teeth (evening)"
# interval_days = 1
# not_before    = "18:00"
# not_after     = "23:00"
# watch         = "metric"
# target        = "brushed_evening"
#
# [reminders.brush_morning]
# display       = "Brush teeth (morning)"
# interval_days = 1
# not_before    = "07:00"
# not_after     = "12:00"
# watch         = "metric"
# target        = "brushed_morning"
